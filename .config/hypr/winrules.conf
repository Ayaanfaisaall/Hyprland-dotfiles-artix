# Fix some dragging issues with XWayland
#windowrule = no_focus,match:class ^$,match:title ^$,xwayland:1,float oning:1,fullscreen:0,pinned:0

windowrule = float on, match:class ^(Alacritty)$
windowrule = float on, match:class ^(foot)$
windowrule = float on, match:class ^(kitty)$
windowrule = size 900 600, match:class .*
windowrule = opacity 1.0 override 1.0 override, match:class ^(org.inkscape.Inkscape)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(Alacritty)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(foot)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(kitty)$

windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:title ^(Save As)(.*)$
windowrule = float on, match:title ^(Select a File)(.*)$
windowrule = float on, match:title ^(Choose wallpaper)(.*)$
windowrule = float on, match:title ^(Open)(.*)$
windowrule = float on, match:title ^(Save)(.*)$

windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(xdg-desktop-portal-kde)$
