background {
    monitor =
    # Using your pre-blurred SDDM wallpaper for a 1:1 match
    path = /home/ayaan/.config/hypr/wallpapers/17.jpg   
    color = rgba(25, 25, 25, 0.8)
    blur_passes = 3        
    blur_size = 8      
    noise = 0.0117     
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.5) 
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <b>Password...</b>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    rounding = 15 
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 75
    font_style = bold
    font_family = sans-serif
    position = 0, 80
    halign = center
    valign = center
}
