###################
### KEYBINDINGS ###
###################

source=~/.config/hypr/programs.conf

$mainMod = SUPER

## System Commands
bind = $mainMod ALT, E, exec, $confirm exit
bind = $mainMod ALT, P, exec, $confirm poweroff
bind = $mainMod ALT, R, exec, $confirm reboot
bind = $mainMod ALT, L, exec, $confirm hyprlock
bind = $mainMod ALT, S, exec, $confirm suspend

## Window Management
bind = $mainMod, F, exec, $fullscreen
bind = $mainMod ALT, F, exec, $floating
bind = $mainMod, J, togglesplit, 
bind = $mainMod, M, exec, $minimize amin
bind = $mainMod ALT, M, exec, $minimize bmin
bind = $mainMod, O, exec, $opaque
bind = $mainMod, P, pseudo, 
bind = $mainMod, Q, killactive,

## Utilities
bind = , PRINT, exec, $scrnsht
bind = $mainMod, V, exec, $clpbrd
bind = $mainMod ALT, V, exec, $clrclpbrd

## UI & Layers
bind = $mainMod, B, exec, $bluetooth
bind = $mainMod, E, exec, $ctrlcntr
bind = $mainMod, D, exec, $dockshow 
bind = $mainMod, R, exec, $rofi
bind = $mainMod, W, exec, $wifi

## Apps
bind = $mainMod, C, exec, $browser
bind = $mainMod, G, exec, $gemini
bind = $mainMod, T, exec, $terminal
bind = $mainMod, A, exec, antigravity
bind = $mainMod, I, exec, code
bind = $mainMod SHIFT, W, exec, $whatsapp

## Move focus
bind = ALT, h, movefocus, l
bind = ALT, j, movefocus, d
bind = ALT, k, movefocus, u
bind = ALT, l, movefocus, r

## Audio & Brightness Controls
bindel = ,XF86AudioRaiseVolume, exec, $osd vol_up
bindel = ,XF86AudioLowerVolume, exec, $osd vol_down
bindel = ,XF86AudioMute, exec, $osd vol_mute
bindel = ,XF86AudioMicMute, exec, $osd mic_mute
bindel = ,XF86MonBrightnessUp, exec, $osd br_up
bindel = ,XF86MonBrightnessDown, exec, $osd br_down

## Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

## Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

## Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
 
## Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic

