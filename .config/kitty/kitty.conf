# Fonts
font_family      Comic Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# Font Offset 
modify_font cell_width +2px
modify_font cell_height +3px

# Window
window_padding_width 15
background_opacity 0.8

# Vibrant Earthy (Customized with Pure White)
background            #181818
foreground            #d2d2d2
cursor                #d2d2d2
cursor_text_color     #181818
selection_foreground  #d2d2d2
selection_background  #505050

# Black (Deep warm grey)
color0   #282828
color8   #505050

# Red (Rich Brick/Apple Red)
color1   #e5423d
color9   #e5423d

# Green (Fresh Leaf Green)
color2   #50c154
color10  #50c154

# Yellow (Mustard/Golden Yellow)
color3   #e8b024
color11  #e8b024

# Blue (Clear Sky Blue)
color4   #3282e0
color12  #3282e0

# Magenta (Warm Pink/Magenta)
color5   #d63a86
color13  #d63a86

# Cyan (Teal/Ocean Cyan)
color6   #20b4c6
color14  #20b4c6 

# White (Pure White as requested)
color7   #d2d2d2
color15  #d2d2d2

text_composition_strategy legacy
map ctrl+shift+space show_scrollback
text_composition_strategy 1.5 0
